<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TireOps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 44px 56px;
      background: #0f1216;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    }

    /* Marca por defecto (TireOps) — logo+nombre, variante para fondo oscuro */
    #brandDefault { width: 260px; max-width: 72vw; height: auto; }

    /* Logo del tenant (cacheado) — reemplaza al de TireOps cuando existe */
    #tenantLogo { display: none; max-width: 220px; max-height: 128px; object-fit: contain; }

    .loader {
      width: 180px;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }
    .loader::before {
      content: "";
      position: absolute;
      width: 30%;
      height: 100%;
      background: #bddd2f;
      animation: load 1.4s infinite;
      border-radius: 5px;
    }
    @keyframes load {
      0% { left: -30%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img id="tenantLogo" alt="" />
    <img id="brandDefault" src="./TireOpsDark.svg" alt="TireOps" />
    <div class="loader"></div>
  </div>

  <script>
    // main.js inyecta el logo cacheado del tenant (dataURL) tras did-finish-load.
    // Sin logo (primer arranque o tenant sin logo) → queda la marca TireOps.
    window.__setLogo = function (dataUrl) {
      if (!dataUrl) return;
      var img = document.getElementById("tenantLogo");
      var def = document.getElementById("brandDefault");
      img.onload = function () {
        def.style.display = "none";
        img.style.display = "block";
      };
      img.src = dataUrl;
    };
  </script>
</body>
</html>
